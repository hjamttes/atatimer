<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SPARRING TIMER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@400;700;900&display=swap');

  :root {
    --red: #D10000;
    --red-dark: #8B0000;
    --red-light: #FF3333;
    --white: #F0F0F0;
    --white-dark: #CCCCCC;
    --black: #080808;
    --gray: #161616;
    --gray2: #242424;
    --gray3: #333;
    --accent: #FFD700;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--black);
    font-family: 'Barlow Condensed', sans-serif;
    user-select: none;
    touch-action: manipulation;
  }

  #shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* HEADER */
  #header {
    background: var(--gray);
    border-bottom: 4px solid var(--accent);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 10px;
  }
  #header h1 {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(1.3rem, 3.5vw, 2rem);
    color: var(--white);
    letter-spacing: 4px;
  }
  #header h1 span { color: var(--accent); }

  .mode-switch { display: flex; border: 3px solid var(--accent); }
  .mode-btn {
    background: transparent;
    border: none;
    color: var(--white-dark);
    font-family: 'Oswald', sans-serif;
    font-size: clamp(0.75rem, 2vw, 1rem);
    font-weight: 700;
    letter-spacing: 2px;
    padding: 10px 22px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    min-height: 48px;
  }
  .mode-btn.active { background: var(--accent); color: var(--black); }

  /* MATCH BAR */
  #match-bar {
    background: var(--gray2);
    border-bottom: 3px solid var(--gray3);
    padding: 8px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    flex-wrap: wrap;
    gap: 8px;
  }
  #match-bar.hidden { display: none; }
  .mb-group { display: flex; align-items: center; gap: 24px; }
  .mb-item { text-align: center; }
  .mb-label {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(0.6rem, 1.5vw, 0.75rem);
    letter-spacing: 3px;
    color: #666;
    text-transform: uppercase;
    display: block;
  }
  .mb-value {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    color: var(--accent);
    line-height: 1;
  }
  #btn-next-match {
    background: var(--accent);
    border: none;
    color: var(--black);
    font-family: 'Oswald', sans-serif;
    font-size: clamp(0.7rem, 2vw, 0.95rem);
    font-weight: 700;
    letter-spacing: 2px;
    padding: 10px 24px;
    cursor: pointer;
    text-transform: uppercase;
    min-height: 52px;
    min-width: 150px;
  }
  #btn-next-match:active { filter: brightness(0.82); }

  /* MAIN GRID */
  #main {
    display: grid;
    grid-template-columns: 1fr 220px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* TEAM PANELS */
  .team-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .team-banner {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: 8px;
    text-align: center;
    padding: 14px 0 10px;
    flex-shrink: 0;
    clip-path: polygon(0 0, 100% 0, 94% 100%, 6% 100%);
  }
  .white-banner { background: var(--white); color: var(--black); }
  .red-banner   { background: var(--red);   color: var(--white); }

  .team-body {
    display: flex;
    flex-direction: column;
    flex: 1;
    padding: 12px;
    gap: 10px;
    overflow: hidden;
  }

  .score-block {
    background: var(--gray);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 8px 8px;
    flex: 1;
    overflow: hidden;
  }
  .score-block.wb { border: 3px solid var(--white-dark); }
  .score-block.rb { border: 3px solid var(--red-dark); }

  .score-lbl {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(0.6rem, 1.5vw, 0.75rem);
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 4px;
    flex-shrink: 0;
  }

  .score-num {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(4rem, 13vw, 9rem);
    line-height: 1;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wn { color: var(--white); }
  .rn { color: var(--red-light); }

  .score-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
    flex-shrink: 0;
  }
  .sbtn {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(2rem, 4.5vw, 3rem);
    border: none;
    cursor: pointer;
    padding: 14px 0;
    line-height: 1;
    min-height: 68px;
  }
  .sbtn:active { filter: brightness(0.7); transform: scale(0.95); }

  .pw { background: var(--white);    color: var(--black); }
  .mw { background: #777;            color: var(--black); }
  .pr { background: var(--red);      color: var(--white); }
  .mr { background: var(--red-dark); color: #ddd; }

  .cum-block {
    background: var(--gray2);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px;
    flex-shrink: 0;
  }
  .cum-block.wb { border: 3px solid var(--white-dark); }
  .cum-block.rb { border: 3px solid var(--red-dark); }
  .cum-block.hidden { display: none; }

  .cum-num {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(1.8rem, 4.5vw, 3rem);
    line-height: 1;
  }

  /* CENTER */
  #center-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 14px 10px;
    gap: 10px;
    background: var(--gray);
    border-left: 3px solid var(--gray3);
    border-right: 3px solid var(--gray3);
    overflow: hidden;
  }

  #timer-display {
    background: var(--black);
    border: 4px solid var(--accent);
    padding: 14px 10px 8px;
    text-align: center;
    width: 100%;
    cursor: pointer;
    position: relative;
  }
  #timer-hint {
    font-family: 'Oswald', sans-serif;
    font-size: 0.52rem;
    letter-spacing: 2px;
    color: #3a3a3a;
    text-transform: uppercase;
    position: absolute;
    top: 4px;
    right: 6px;
  }
  #timer-text {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(2.8rem, 8vw, 5rem);
    color: var(--accent);
    letter-spacing: 4px;
    line-height: 1;
    display: block;
    transition: color 0.25s;
  }
  #timer-text.warning { color: #FF8800; }
  #timer-text.danger  { color: var(--red-light); animation: blink 0.45s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #timer-sub {
    font-family: 'Oswald', sans-serif;
    font-size: 0.58rem;
    letter-spacing: 3px;
    color: #444;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .presets {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    width: 100%;
  }
  .preset-btn {
    background: var(--gray2);
    border: 2px solid var(--gray3);
    color: var(--white-dark);
    font-family: 'Oswald', sans-serif;
    font-size: clamp(0.75rem, 2vw, 1rem);
    font-weight: 700;
    letter-spacing: 1px;
    padding: 10px 4px;
    cursor: pointer;
    text-align: center;
    text-transform: uppercase;
    min-height: 50px;
    transition: all 0.1s;
  }
  .preset-btn.sel { background: var(--accent); color: var(--black); border-color: var(--accent); }
  .preset-btn:active { filter: brightness(0.8); }

  #btn-start {
    background: #004d00;
    border: none;
    color: #00DD55;
    font-family: 'Black Ops One', cursive;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    letter-spacing: 3px;
    padding: 16px;
    width: 100%;
    cursor: pointer;
    text-transform: uppercase;
    min-height: 62px;
  }
  #btn-start.running { background: #5c2900; color: #FFAA33; }
  #btn-start:active  { filter: brightness(0.78); }

  #btn-reset {
    background: var(--gray2);
    border: 2px solid var(--gray3);
    color: #666;
    font-family: 'Oswald', sans-serif;
    font-size: clamp(0.7rem, 1.8vw, 0.9rem);
    font-weight: 700;
    letter-spacing: 2px;
    padding: 10px;
    width: 100%;
    cursor: pointer;
    text-transform: uppercase;
    min-height: 48px;
  }
  #btn-reset:active { border-color: var(--red-light); color: var(--red-light); }

  /* CUSTOM TIME MODAL */
  #time-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 50;
    align-items: center;
    justify-content: center;
  }
  #time-modal.show { display: flex; }
  #modal-box {
    background: var(--gray);
    border: 4px solid var(--accent);
    padding: 32px 38px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    min-width: 300px;
  }
  #modal-box h3 {
    font-family: 'Black Ops One', cursive;
    font-size: 1.4rem;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .time-row { display: flex; align-items: center; gap: 10px; }
  .time-row span {
    font-family: 'Black Ops One', cursive;
    font-size: 2.8rem;
    color: var(--white);
  }
  .tfield {
    background: var(--black);
    border: 3px solid var(--gray3);
    color: var(--white);
    font-family: 'Black Ops One', cursive;
    font-size: 3rem;
    width: 90px;
    text-align: center;
    padding: 8px 4px;
    -moz-appearance: textfield;
  }
  .tfield::-webkit-inner-spin-button,
  .tfield::-webkit-outer-spin-button { -webkit-appearance: none; }
  .tfield:focus { outline: none; border-color: var(--accent); }
  .modal-row { display: flex; gap: 10px; width: 100%; }
  .mbtn {
    flex: 1;
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 14px;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    min-height: 56px;
  }
  .mbtn-ok     { background: var(--accent); color: var(--black); }
  .mbtn-cancel { background: var(--gray2); color: #777; border: 2px solid var(--gray3); }
  .mbtn:active { filter: brightness(0.82); }

  /* FLASH */
  #flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
    opacity: 0;
    transition: opacity 0.07s;
  }
  #flash.rf { background: var(--red); opacity: 0.18; }
  #flash.wf { background: #fff;       opacity: 0.13; }

  /* WIN TOAST */
  #win-toast {
    position: fixed;
    bottom: -120px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gray);
    border: 4px solid var(--accent);
    padding: 14px 38px;
    text-align: center;
    z-index: 60;
    transition: bottom 0.38s cubic-bezier(0.175,0.885,0.32,1.275);
    pointer-events: none;
    min-width: 260px;
    white-space: nowrap;
  }
  #win-toast.show { bottom: 24px; }
  #wt-text {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(1.2rem, 4vw, 2rem);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  #wt-text.rt { color: var(--red-light); }
  #wt-text.wt { color: var(--white); }
  #wt-text.dt { color: var(--accent); }
  #wt-sub {
    font-family: 'Oswald', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 3px;
    color: #666;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Landscape tablet optimization */
  @media (min-width: 768px) and (orientation: landscape) {
    #main { grid-template-columns: 1fr 240px 1fr; }
    .sbtn { min-height: 80px; font-size: clamp(2.2rem, 4vw, 3.2rem); }
    .score-num { font-size: clamp(5rem, 14vw, 10rem); }
  }
  @media (min-width: 1024px) and (orientation: landscape) {
    #main { grid-template-columns: 1fr 260px 1fr; }
  }
</style>
</head>
<body>

<div id="flash"></div>

<div id="win-toast">
  <div id="wt-text"></div>
  <div id="wt-sub"></div>
</div>

<div id="time-modal">
  <div id="modal-box">
    <h3>Custom Time</h3>
    <div class="time-row">
      <input class="tfield" id="cm" type="number" min="0" max="9" value="1" inputmode="numeric">
      <span>:</span>
      <input class="tfield" id="cs" type="number" min="0" max="59" value="0" inputmode="numeric">
    </div>
    <div class="modal-row">
      <button class="mbtn mbtn-cancel" onclick="closeModal()">Cancel</button>
      <button class="mbtn mbtn-ok"     onclick="applyTime()">Set Time</button>
    </div>
  </div>
</div>

<div id="shell">

  <div id="header">
    <h1>SPARRING <span>TIMER</span></h1>
    <div class="mode-switch">
      <button class="mode-btn active" id="btn-team" onclick="setMode('team')">TEAM</button>
      <button class="mode-btn"        id="btn-ind"  onclick="setMode('individual')">INDIVIDUAL</button>
    </div>
  </div>

  <div id="match-bar">
    <div class="mb-group">
      <div class="mb-item">
        <span class="mb-label">Match</span>
        <div class="mb-value" id="match-num">1</div>
      </div>
      <div class="mb-item">
        <span class="mb-label">White Wins</span>
        <div class="mb-value" id="white-wins">0</div>
      </div>
      <div class="mb-item">
        <span class="mb-label">Red Wins</span>
        <div class="mb-value" id="red-wins">0</div>
      </div>
    </div>
    <button id="btn-next-match" onclick="nextMatch()">NEXT MATCH ▶</button>
  </div>

  <div id="main">

    <!-- WHITE LEFT -->
    <div class="team-panel">
      <div class="team-banner white-banner">WHITE</div>
      <div class="team-body">
        <div class="score-block wb">
          <div class="score-lbl">Match Points</div>
          <div class="score-num wn" id="white-pts">0</div>
          <div class="score-btns">
            <button class="sbtn pw" ontouchstart="" onclick="addPt('white')">+</button>
            <button class="sbtn mw" ontouchstart="" onclick="subPt('white')">−</button>
          </div>
        </div>
        <div class="cum-block wb" id="white-cum">
          <div class="score-lbl">Cumulative</div>
          <div class="cum-num wn" id="white-cum-pts">0</div>
        </div>
      </div>
    </div>

    <!-- CENTER -->
    <div id="center-panel">
      <div id="timer-display" onclick="openModal()">
        <div id="timer-hint">TAP TO EDIT</div>
        <span id="timer-text">1:00</span>
        <div id="timer-sub">ROUND TIMER</div>
      </div>

      <div class="presets">
        <button class="preset-btn sel" onclick="setPreset(60,this)">1:00</button>
        <button class="preset-btn"     onclick="setPreset(90,this)">1:30</button>
        <button class="preset-btn"     onclick="setPreset(105,this)">1:45</button>
        <button class="preset-btn"     onclick="setPreset(120,this)">2:00</button>
      </div>

      <button id="btn-start" onclick="toggleTimer()">▶ START</button>
      <button id="btn-reset" onclick="resetTimer()">↺ RESET TIMER</button>
    </div>

    <!-- RED RIGHT -->
    <div class="team-panel">
      <div class="team-banner red-banner">RED</div>
      <div class="team-body">
        <div class="score-block rb">
          <div class="score-lbl">Match Points</div>
          <div class="score-num rn" id="red-pts">0</div>
          <div class="score-btns">
            <button class="sbtn pr" ontouchstart="" onclick="addPt('red')">+</button>
            <button class="sbtn mr" ontouchstart="" onclick="subPt('red')">−</button>
          </div>
        </div>
        <div class="cum-block rb" id="red-cum">
          <div class="score-lbl">Cumulative</div>
          <div class="cum-num rn" id="red-cum-pts">0</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// STATE
let mode = 'team';
let selTime = 60, timeLeft = 60;
let running = false, interval = null;
let scores = { white:{m:0,c:0}, red:{m:0,c:0} };
let matchNum = 1, wins = {white:0,red:0};
let audioCtx = null;

function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

// Single lightweight tone — one oscillator, one gain, nothing else
function beep(freq=880, dur=0.15, vol=0.5, type='square') {
  try {
    const c = ctx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.connect(g);
    g.connect(c.destination);
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.start();
    o.stop(c.currentTime + dur);
  } catch(e) {}
}

// Buzzer: three sequential beeps, no simultaneous nodes
function buzzer() {
  beep(160, 0.6, 0.7, 'sawtooth');
  setTimeout(() => beep(140, 0.6, 0.7, 'sawtooth'), 650);
  setTimeout(() => beep(120, 0.8, 0.7, 'sawtooth'), 1300);
}

// MODE
function setMode(m) {
  mode=m;
  document.getElementById('btn-team').classList.toggle('active',m==='team');
  document.getElementById('btn-ind').classList.toggle('active',m==='individual');
  const team = m==='team';
  document.getElementById('match-bar').classList.toggle('hidden',!team);
  document.getElementById('white-cum').classList.toggle('hidden',!team);
  document.getElementById('red-cum').classList.toggle('hidden',!team);
  resetAll();
}

// SCORING
function addPt(t) {
  scores[t].m++;
  if(mode==='team') scores[t].c++;
  render();
  flash(t);
  beep(t==='red'?580:920,0.12,0.5);
}
function subPt(t) {
  if(scores[t].m>0){
    scores[t].m--;
    if(mode==='team') scores[t].c=Math.max(0,scores[t].c-1);
  }
  render();
  beep(160,0.1,0.3,'sine');
}
function render() {
  document.getElementById('white-pts').textContent     = scores.white.m;
  document.getElementById('red-pts').textContent       = scores.red.m;
  document.getElementById('white-cum-pts').textContent = scores.white.c;
  document.getElementById('red-cum-pts').textContent   = scores.red.c;
}

// NEXT MATCH — no popup, just a quick slide-up toast
function nextMatch() {
  ctx(); // unlock audio
  let w = scores.red.m > scores.white.m ? 'red'
        : scores.white.m > scores.red.m ? 'white'
        : 'draw';
  if(w!=='draw') wins[w]++;
  matchNum++;
  document.getElementById('match-num').textContent   = matchNum;
  document.getElementById('red-wins').textContent    = wins.red;
  document.getElementById('white-wins').textContent  = wins.white;
  scores.white.m=0; scores.red.m=0;
  render();
  resetTimer();
  toast(w);
  beep(500,0.12,0.45);
}

let toastTmr=null;
function toast(w) {
  const el=document.getElementById('win-toast');
  const tx=document.getElementById('wt-text');
  const sb=document.getElementById('wt-sub');
  if(w==='draw'){tx.textContent='DRAW';tx.className='dt';sb.textContent='MATCH TIED';}
  else{tx.textContent=w.toUpperCase()+' WINS';tx.className=w==='red'?'rt':'wt';sb.textContent='MATCH COMPLETE — NEXT MATCH';}
  el.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>el.classList.remove('show'),2600);
}

function resetAll() {
  scores={white:{m:0,c:0},red:{m:0,c:0}};
  matchNum=1;wins={white:0,red:0};
  document.getElementById('match-num').textContent=1;
  document.getElementById('red-wins').textContent=0;
  document.getElementById('white-wins').textContent=0;
  render();resetTimer();
}

// TIMER
function setPreset(s,btn) {
  selTime=s;timeLeft=s;
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  updateClock();stopTimer();
  document.getElementById('btn-start').textContent='▶ START';
}

function toggleTimer() {
  ctx();
  if(running){
    stopTimer();
    document.getElementById('btn-start').textContent='▶ RESUME';
  } else {
    if(timeLeft<=0){timeLeft=selTime;updateClock();}
    running=true;
    document.getElementById('btn-start').textContent='⏸ PAUSE';
    document.getElementById('btn-start').classList.add('running');
    beep(720,0.1,0.5);
    interval=setInterval(tick,1000);
  }
}

function stopTimer() {
  clearInterval(interval);running=false;
  document.getElementById('btn-start').classList.remove('running');
}

function resetTimer() {
  stopTimer();timeLeft=selTime;updateClock();
  document.getElementById('btn-start').textContent='▶ START';
}

function tick() {
  timeLeft--;
  updateClock();
  if(timeLeft===10) beep(920,0.14,0.6);
  if(timeLeft>0&&timeLeft<=5) beep(1100,0.1,0.7);
  if(timeLeft<=0){
    stopTimer();timeLeft=0;updateClock();
    document.getElementById('btn-start').textContent='▶ START';
    buzzer();
  }
}

function updateClock() {
  const m=Math.floor(timeLeft/60),s=timeLeft%60;
  const el=document.getElementById('timer-text');
  el.textContent=m+':'+String(s).padStart(2,'0');
  el.className='';
  if(timeLeft<=5&&timeLeft>0)  el.classList.add('danger');
  else if(timeLeft<=15)        el.classList.add('warning');
}

// CUSTOM TIME MODAL
function openModal() {
  if(running) return;
  document.getElementById('cm').value=Math.floor(selTime/60);
  document.getElementById('cs').value=selTime%60;
  document.getElementById('time-modal').classList.add('show');
  setTimeout(()=>document.getElementById('cm').focus(),80);
}
function closeModal() {
  document.getElementById('time-modal').classList.remove('show');
}
function applyTime() {
  let m=parseInt(document.getElementById('cm').value)||0;
  let s=parseInt(document.getElementById('cs').value)||0;
  m=Math.min(9,Math.max(0,m));
  s=Math.min(59,Math.max(0,s));
  const total=m*60+s;
  if(total<5){document.getElementById('cm').focus();return;}
  selTime=total;timeLeft=total;
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('sel'));
  updateClock();closeModal();
}
document.getElementById('time-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

// FLASH
function flash(t) {
  const f=document.getElementById('flash');
  f.className=t==='red'?'rf':'wf';
  setTimeout(()=>f.className='',170);
}

// INIT
function init() {
  setMode('team');
  updateClock();
  // Wake lock — prevents screen sleep on Android
  if('wakeLock' in navigator){
    navigator.wakeLock.request('screen').catch(()=>{});
    document.addEventListener('visibilitychange',()=>{
      if(document.visibilityState==='visible')
        navigator.wakeLock.request('screen').catch(()=>{});
    });
  }
}
init();
</script>
