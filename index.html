<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SPARRING TIMER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@400;700;900&display=swap');

  :root {
    --red: #D10000;
    --red-dark: #8B0000;
    --red-light: #FF3333;
    --white: #F0F0F0;
    --white-dark: #CCCCCC;
    --black: #080808;
    --gray: #161616;
    --gray2: #242424;
    --gray3: #333;
    --accent: #FFD700;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--black);
    font-family: 'Barlow Condensed', sans-serif;
    user-select: none;
    touch-action: manipulation;
  }

  #shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* ── HEADER ── */
  #header {
    background: var(--gray);
    border-bottom: 4px solid var(--accent);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 8px;
  }
  #header h1 {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(1.1rem, 3vw, 1.8rem);
    color: var(--white);
    letter-spacing: 4px;
  }
  #header h1 span { color: var(--accent); }

  .header-controls { display: flex; align-items: center; gap: 8px; }

  .mode-switch { display: flex; border: 3px solid var(--accent); }
  .mode-btn {
    background: transparent;
    border: none;
    color: var(--white-dark);
    font-family: 'Oswald', sans-serif;
    font-size: clamp(0.7rem, 1.8vw, 0.95rem);
    font-weight: 700;
    letter-spacing: 2px;
    padding: 8px 18px;
    cursor: pointer;
    text-transform: uppercase;
    min-height: 48px;
  }
  .mode-btn.active { background: var(--accent); color: var(--black); }
  .mode-btn:active { filter: brightness(0.85); }

  /* RESET ALL button */
  #btn-reset-all {
    background: #3a0000;
    border: 2px solid #660000;
    color: #ff6666;
    font-family: 'Oswald', sans-serif;
    font-size: clamp(0.65rem, 1.6vw, 0.85rem);
    font-weight: 700;
    letter-spacing: 2px;
    padding: 8px 14px;
    cursor: pointer;
    text-transform: uppercase;
    min-height: 48px;
    white-space: nowrap;
  }
  #btn-reset-all:active { filter: brightness(1.3); }

  /* ── MATCH BAR ── */
  #match-bar {
    background: var(--gray2);
    border-bottom: 3px solid var(--gray3);
    padding: 6px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    flex-wrap: wrap;
    gap: 6px;
  }
  #match-bar.hidden { display: none; }
  .mb-group { display: flex; align-items: center; gap: 18px; }
  .mb-item { text-align: center; }
  .mb-label {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(0.55rem, 1.3vw, 0.7rem);
    letter-spacing: 3px;
    color: #666;
    text-transform: uppercase;
    display: block;
  }
  /* Editable match number */
  .mb-value {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(1.1rem, 2.8vw, 1.7rem);
    color: var(--accent);
    line-height: 1;
  }
  #match-num-input {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(1.1rem, 2.8vw, 1.7rem);
    color: var(--accent);
    background: transparent;
    border: none;
    border-bottom: 2px solid #555;
    width: 2.4ch;
    text-align: center;
    -moz-appearance: textfield;
    padding: 0;
    line-height: 1;
  }
  #match-num-input::-webkit-inner-spin-button,
  #match-num-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  #match-num-input:focus { outline: none; border-bottom-color: var(--accent); }

  #btn-next-match {
    background: var(--accent);
    border: none;
    color: var(--black);
    font-family: 'Oswald', sans-serif;
    font-size: clamp(0.65rem, 1.8vw, 0.9rem);
    font-weight: 700;
    letter-spacing: 2px;
    padding: 8px 20px;
    cursor: pointer;
    text-transform: uppercase;
    min-height: 48px;
    min-width: 130px;
  }
  #btn-next-match:active { filter: brightness(0.82); }

  /* ── MAIN GRID ── */
  #main {
    display: grid;
    grid-template-columns: 1fr 210px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── TEAM PANELS ── */
  .team-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .team-banner {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(1.8rem, 4.5vw, 3.2rem);
    letter-spacing: 8px;
    text-align: center;
    padding: 12px 0 8px;
    flex-shrink: 0;
    clip-path: polygon(0 0, 100% 0, 94% 100%, 6% 100%);
  }
  .white-banner { background: var(--white); color: var(--black); }
  .red-banner   { background: var(--red);   color: var(--white); }

  .team-body {
    display: flex;
    flex-direction: column;
    flex: 1;
    padding: 10px;
    gap: 8px;
    overflow: hidden;
  }

  /* Both score blocks take equal space — flex:1 on each */
  .score-block {
    background: var(--gray);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 8px 6px;
    flex: 1;          /* match block */
    overflow: hidden;
    min-height: 0;
  }
  .cum-block {
    background: var(--gray2);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px;
    flex: 1;          /* same as score-block so they're equal height */
    min-height: 0;
    overflow: hidden;
  }
  .score-block.wb { border: 3px solid var(--white-dark); }
  .score-block.rb { border: 3px solid var(--red-dark); }
  .cum-block.wb   { border: 3px solid var(--white-dark); }
  .cum-block.rb   { border: 3px solid var(--red-dark); }
  .cum-block.hidden { display: none; }

  .score-lbl {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(0.55rem, 1.3vw, 0.7rem);
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 2px;
    flex-shrink: 0;
  }

  /* Score number fills available vertical space */
  .score-num {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(3.5rem, 11vw, 8rem);
    line-height: 1;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .cum-num {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(3.5rem, 11vw, 8rem);
    line-height: 1;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .wn { color: var(--white); }
  .rn { color: var(--red-light); }

  .score-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    width: 100%;
    flex-shrink: 0;
  }
  .sbtn {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    border: none;
    cursor: pointer;
    padding: 12px 0;
    line-height: 1;
    min-height: 62px;
  }
  .sbtn:active { filter: brightness(0.7); transform: scale(0.95); }

  /* White: + outside (left), − inside (right) */
  .pw { background: var(--white);    color: var(--black); }
  .mw { background: #777;            color: var(--black); }
  /* Red:   + outside (right), − inside (left) */
  .pr { background: var(--red);      color: var(--white); }
  .mr { background: var(--red-dark); color: #ddd; }

  /* ── CENTER ── */
  #center-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 8px;
    gap: 8px;
    background: var(--gray);
    border-left: 3px solid var(--gray3);
    border-right: 3px solid var(--gray3);
    overflow: hidden;
  }

  #timer-display {
    background: var(--black);
    border: 4px solid var(--accent);
    padding: 12px 8px 6px;
    text-align: center;
    width: 100%;
    cursor: pointer;
    position: relative;
  }
  #timer-hint {
    font-family: 'Oswald', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 2px;
    color: #3a3a3a;
    text-transform: uppercase;
    position: absolute;
    top: 3px;
    right: 5px;
  }
  #timer-text {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(2.6rem, 7.5vw, 4.8rem);
    color: var(--accent);
    letter-spacing: 4px;
    line-height: 1;
    display: block;
    transition: color 0.25s;
  }
  #timer-text.warning { color: #FF8800; }
  #timer-text.danger  { color: var(--red-light); animation: blink 0.45s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #timer-sub {
    font-family: 'Oswald', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 3px;
    color: #444;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .presets {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    width: 100%;
  }
  .preset-btn {
    background: var(--gray2);
    border: 2px solid var(--gray3);
    color: var(--white-dark);
    font-family: 'Oswald', sans-serif;
    font-size: clamp(0.7rem, 1.8vw, 0.95rem);
    font-weight: 700;
    letter-spacing: 1px;
    padding: 9px 4px;
    cursor: pointer;
    text-align: center;
    text-transform: uppercase;
    min-height: 48px;
  }
  .preset-btn.sel { background: var(--accent); color: var(--black); border-color: var(--accent); }
  .preset-btn:active { filter: brightness(0.8); }

  #btn-start {
    background: #004d00;
    border: none;
    color: #00DD55;
    font-family: 'Black Ops One', cursive;
    font-size: clamp(0.95rem, 2.3vw, 1.3rem);
    letter-spacing: 3px;
    padding: 14px;
    width: 100%;
    cursor: pointer;
    text-transform: uppercase;
    min-height: 58px;
  }
  #btn-start.running { background: #5c2900; color: #FFAA33; }
  #btn-start:active  { filter: brightness(0.78); }

  #btn-reset-timer {
    background: var(--gray2);
    border: 2px solid var(--gray3);
    color: #666;
    font-family: 'Oswald', sans-serif;
    font-size: clamp(0.65rem, 1.7vw, 0.85rem);
    font-weight: 700;
    letter-spacing: 2px;
    padding: 9px;
    width: 100%;
    cursor: pointer;
    text-transform: uppercase;
    min-height: 46px;
  }
  #btn-reset-timer:active { border-color: var(--red-light); color: var(--red-light); }

  /* ── CUSTOM TIME MODAL ── */
  #time-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 50;
    align-items: center;
    justify-content: center;
  }
  #time-modal.show { display: flex; }
  #modal-box {
    background: var(--gray);
    border: 4px solid var(--accent);
    padding: 28px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    min-width: 290px;
  }
  #modal-box h3 {
    font-family: 'Black Ops One', cursive;
    font-size: 1.3rem;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .time-row { display: flex; align-items: center; gap: 10px; }
  .time-row span {
    font-family: 'Black Ops One', cursive;
    font-size: 2.8rem;
    color: var(--white);
  }
  .tfield {
    background: var(--black);
    border: 3px solid var(--gray3);
    color: var(--white);
    font-family: 'Black Ops One', cursive;
    font-size: 3rem;
    width: 88px;
    text-align: center;
    padding: 8px 4px;
    -moz-appearance: textfield;
  }
  .tfield::-webkit-inner-spin-button,
  .tfield::-webkit-outer-spin-button { -webkit-appearance: none; }
  .tfield:focus { outline: none; border-color: var(--accent); }
  .modal-row { display: flex; gap: 10px; width: 100%; }
  .mbtn {
    flex: 1;
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 14px;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    min-height: 54px;
  }
  .mbtn-ok     { background: var(--accent); color: var(--black); }
  .mbtn-cancel { background: var(--gray2); color: #777; border: 2px solid var(--gray3); }
  .mbtn:active { filter: brightness(0.82); }

  /* ── CONFIRM RESET MODAL ── */
  #confirm-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 50;
    align-items: center;
    justify-content: center;
  }
  #confirm-modal.show { display: flex; }
  #confirm-box {
    background: var(--gray);
    border: 4px solid var(--red-light);
    padding: 28px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    min-width: 280px;
    text-align: center;
  }
  #confirm-box h3 {
    font-family: 'Black Ops One', cursive;
    font-size: 1.3rem;
    letter-spacing: 3px;
    color: var(--red-light);
    text-transform: uppercase;
  }
  #confirm-box p {
    font-family: 'Oswald', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 2px;
    color: #888;
    text-transform: uppercase;
  }

  /* ── FLASH ── */
  #flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
    opacity: 0;
    transition: opacity 0.07s;
  }
  #flash.rf { background: var(--red); opacity: 0.18; }
  #flash.wf { background: #fff;       opacity: 0.13; }

  /* Landscape tablet optimization */
  @media (min-width: 768px) and (orientation: landscape) {
    #main { grid-template-columns: 1fr 230px 1fr; }
    .sbtn { min-height: 74px; }
  }
  @media (min-width: 1024px) and (orientation: landscape) {
    #main { grid-template-columns: 1fr 250px 1fr; }
  }
</style>
</head>
<body>

<div id="flash"></div>

<!-- CUSTOM TIME MODAL -->
<div id="time-modal">
  <div id="modal-box">
    <h3>Custom Time</h3>
    <div class="time-row">
      <input class="tfield" id="cm" type="number" min="0" max="9" value="1" inputmode="numeric">
      <span>:</span>
      <input class="tfield" id="cs" type="number" min="0" max="59" value="0" inputmode="numeric">
    </div>
    <div class="modal-row">
      <button class="mbtn mbtn-cancel" onclick="closeTimeModal()">Cancel</button>
      <button class="mbtn mbtn-ok"     onclick="applyTime()">Set Time</button>
    </div>
  </div>
</div>

<!-- CONFIRM RESET MODAL -->
<div id="confirm-modal">
  <div id="confirm-box">
    <h3>Reset Everything?</h3>
    <p>All scores, wins, and match<br>count will be cleared.</p>
    <div class="modal-row">
      <button class="mbtn mbtn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="mbtn" style="background:var(--red);color:#fff;" onclick="doResetAll()">Reset All</button>
    </div>
  </div>
</div>

<div id="shell">

  <!-- HEADER -->
  <div id="header">
    <h1>SPARRING <span>TIMER</span></h1>
    <div class="header-controls">
      <div class="mode-switch">
        <button class="mode-btn active" id="btn-team" onclick="setMode('team')">TEAM</button>
        <button class="mode-btn"        id="btn-ind"  onclick="setMode('individual')">INDIVIDUAL</button>
      </div>
      <button id="btn-reset-all" onclick="openConfirm()">↺ RESET ALL</button>
    </div>
  </div>

  <!-- MATCH BAR -->
  <div id="match-bar">
    <div class="mb-group">
      <div class="mb-item">
        <span class="mb-label">Match</span>
        <!-- Editable match number -->
        <input type="number" id="match-num-input" value="1" min="1" max="99" inputmode="numeric">
      </div>
      <div class="mb-item">
        <span class="mb-label">White Wins</span>
        <div class="mb-value" id="white-wins">0</div>
      </div>
      <div class="mb-item">
        <span class="mb-label">Red Wins</span>
        <div class="mb-value" id="red-wins">0</div>
      </div>
    </div>
    <button id="btn-next-match" onclick="nextMatch()">NEXT MATCH ▶</button>
  </div>

  <!-- MAIN GRID -->
  <div id="main">

    <!-- WHITE LEFT -->
    <div class="team-panel">
      <div class="team-banner white-banner">WHITE</div>
      <div class="team-body">
        <div class="score-block wb">
          <div class="score-lbl">Match Points</div>
          <div class="score-num wn" id="white-pts">0</div>
          <div class="score-btns">
            <!-- White: + on outside (left), − on inside (right) -->
            <button class="sbtn pw" ontouchstart="" onclick="addPt('white')">+</button>
            <button class="sbtn mw" ontouchstart="" onclick="subPt('white')">−</button>
          </div>
        </div>
        <div class="cum-block wb" id="white-cum">
          <div class="score-lbl">Cumulative</div>
          <div class="cum-num wn" id="white-cum-pts">0</div>
        </div>
      </div>
    </div>

    <!-- CENTER -->
    <div id="center-panel">
      <div id="timer-display" onclick="openTimeModal()">
        <div id="timer-hint">TAP TO EDIT</div>
        <span id="timer-text">1:00</span>
        <div id="timer-sub">ROUND TIMER</div>
      </div>

      <div class="presets">
        <button class="preset-btn sel" onclick="setPreset(60,this)">1:00</button>
        <button class="preset-btn"     onclick="setPreset(90,this)">1:30</button>
        <button class="preset-btn"     onclick="setPreset(105,this)">1:45</button>
        <button class="preset-btn"     onclick="setPreset(120,this)">2:00</button>
      </div>

      <button id="btn-start"       onclick="toggleTimer()">▶ START</button>
      <button id="btn-reset-timer" onclick="resetTimer()">↺ RESET TIMER</button>
    </div>

    <!-- RED RIGHT -->
    <div class="team-panel">
      <div class="team-banner red-banner">RED</div>
      <div class="team-body">
        <div class="score-block rb">
          <div class="score-lbl">Match Points</div>
          <div class="score-num rn" id="red-pts">0</div>
          <div class="score-btns">
            <!-- Red: − on inside (left), + on outside (right) -->
            <button class="sbtn mr" ontouchstart="" onclick="subPt('red')">−</button>
            <button class="sbtn pr" ontouchstart="" onclick="addPt('red')">+</button>
          </div>
        </div>
        <div class="cum-block rb" id="red-cum">
          <div class="score-lbl">Cumulative</div>
          <div class="cum-num rn" id="red-cum-pts">0</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────
let mode = 'team';
let selTime = 60, timeLeft = 60;
let running = false, interval = null;
let scores = { white:{m:0,c:0}, red:{m:0,c:0} };
let wins = {white:0, red:0};
let audioCtx = null;

// ── AUDIO ──────────────────────────────────────────────────────────
function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function beep(freq=880, dur=0.15, vol=0.5, type='square') {
  try {
    const c = ctx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.start(); o.stop(c.currentTime + dur);
  } catch(e) {}
}

// End-of-round sound — plays sound/buzzer.mp3 from the repo
// Falls back to sequential beeps if the file isn't available
let buzzerAudio = null;
function loadBuzzer() {
  try {
    buzzerAudio = new Audio('sound/buzzer.mp3');
    buzzerAudio.preload = 'auto';
  } catch(e) { buzzerAudio = null; }
}

function buzzer() {
  if (buzzerAudio) {
    try {
      buzzerAudio.currentTime = 0;
      buzzerAudio.play().catch(() => beepBuzzer());
      return;
    } catch(e) {}
  }
  beepBuzzer();
}

function beepBuzzer() {
  beep(160, 0.6, 0.7, 'sawtooth');
  setTimeout(() => beep(140, 0.6, 0.7, 'sawtooth'), 650);
  setTimeout(() => beep(120, 0.8, 0.7, 'sawtooth'), 1300);
}

// ── MODE ────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btn-team').classList.toggle('active', m==='team');
  document.getElementById('btn-ind').classList.toggle('active', m==='individual');
  const team = m === 'team';
  document.getElementById('match-bar').classList.toggle('hidden', !team);
  document.getElementById('white-cum').classList.toggle('hidden', !team);
  document.getElementById('red-cum').classList.toggle('hidden', !team);
  doResetAll(true); // silent reset (no confirm) when switching modes
}

// ── SCORING ─────────────────────────────────────────────────────────
function addPt(t) {
  scores[t].m++;
  if (mode === 'team') scores[t].c++;
  render();
  flash(t);
  beep(t==='red' ? 580 : 920, 0.12, 0.5);
}

function subPt(t) {
  if (scores[t].m > 0) {
    scores[t].m--;
    if (mode === 'team') scores[t].c = Math.max(0, scores[t].c - 1);
  }
  render();
  beep(160, 0.1, 0.3, 'sine');
}

function render() {
  document.getElementById('white-pts').textContent     = scores.white.m;
  document.getElementById('red-pts').textContent       = scores.red.m;
  document.getElementById('white-cum-pts').textContent = scores.white.c;
  document.getElementById('red-cum-pts').textContent   = scores.red.c;
}

// ── NEXT MATCH — just advance, no popup ─────────────────────────────
function nextMatch() {
  ctx(); // unlock audio
  let w = scores.red.m > scores.white.m ? 'red'
        : scores.white.m > scores.red.m  ? 'white'
        : null;
  if (w) wins[w]++;

  // Advance match number (use the editable input value)
  let cur = parseInt(document.getElementById('match-num-input').value) || 1;
  document.getElementById('match-num-input').value = cur + 1;
  document.getElementById('red-wins').textContent   = wins.red;
  document.getElementById('white-wins').textContent = wins.white;

  scores.white.m = 0;
  scores.red.m   = 0;
  render();
  resetTimer();
  beep(500, 0.12, 0.45);
}

// ── RESET ─────────────────────────────────────────────────────────
function openConfirm() {
  document.getElementById('confirm-modal').classList.add('show');
}
function closeConfirm() {
  document.getElementById('confirm-modal').classList.remove('show');
}

// silent=true skips the confirm modal (used internally by setMode)
function doResetAll(silent) {
  if (silent !== true) closeConfirm();
  scores = { white:{m:0,c:0}, red:{m:0,c:0} };
  wins   = { white:0, red:0 };
  document.getElementById('match-num-input').value    = 1;
  document.getElementById('red-wins').textContent     = 0;
  document.getElementById('white-wins').textContent   = 0;
  render();
  resetTimer();
}

// ── TIMER ──────────────────────────────────────────────────────────
function setPreset(s, btn) {
  selTime = s; timeLeft = s;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  updateClock(); stopTimer();
  document.getElementById('btn-start').textContent = '▶ START';
}

function toggleTimer() {
  ctx();
  if (running) {
    stopTimer();
    document.getElementById('btn-start').textContent = '▶ RESUME';
  } else {
    if (timeLeft <= 0) { timeLeft = selTime; updateClock(); }
    running = true;
    document.getElementById('btn-start').textContent = '⏸ PAUSE';
    document.getElementById('btn-start').classList.add('running');
    beep(720, 0.1, 0.5);
    interval = setInterval(tick, 1000);
  }
}

function stopTimer() {
  clearInterval(interval); running = false;
  document.getElementById('btn-start').classList.remove('running');
}

function resetTimer() {
  stopTimer(); timeLeft = selTime; updateClock();
  document.getElementById('btn-start').textContent = '▶ START';
}

function tick() {
  timeLeft--;
  updateClock();
  if (timeLeft === 10) beep(920, 0.14, 0.6);
  if (timeLeft > 0 && timeLeft <= 5) beep(1100, 0.1, 0.7);
  if (timeLeft <= 0) {
    stopTimer(); timeLeft = 0; updateClock();
    document.getElementById('btn-start').textContent = '▶ START';
    buzzer();
  }
}

function updateClock() {
  const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
  const el = document.getElementById('timer-text');
  el.textContent = m + ':' + String(s).padStart(2, '0');
  el.className = '';
  if (timeLeft <= 5 && timeLeft > 0) el.classList.add('danger');
  else if (timeLeft <= 15)           el.classList.add('warning');
}

// ── CUSTOM TIME MODAL ─────────────────────────────────────────────
function openTimeModal() {
  if (running) return;
  document.getElementById('cm').value = Math.floor(selTime / 60);
  document.getElementById('cs').value = selTime % 60;
  document.getElementById('time-modal').classList.add('show');
  setTimeout(() => document.getElementById('cm').focus(), 80);
}
function closeTimeModal() {
  document.getElementById('time-modal').classList.remove('show');
}
function applyTime() {
  let m = parseInt(document.getElementById('cm').value) || 0;
  let s = parseInt(document.getElementById('cs').value) || 0;
  m = Math.min(9, Math.max(0, m));
  s = Math.min(59, Math.max(0, s));
  const total = m * 60 + s;
  if (total < 5) { document.getElementById('cm').focus(); return; }
  selTime = total; timeLeft = total;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('sel'));
  updateClock(); closeTimeModal();
}
document.getElementById('time-modal').addEventListener('click', function(e) {
  if (e.target === this) closeTimeModal();
});
document.getElementById('confirm-modal').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});

// ── FLASH ────────────────────────────────────────────────────────
function flash(t) {
  const f = document.getElementById('flash');
  f.className = t === 'red' ? 'rf' : 'wf';
  setTimeout(() => f.className = '', 170);
}

// ── INIT ─────────────────────────────────────────────────────────
function init() {
  loadBuzzer();
  setMode('team');
  updateClock();
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible')
        navigator.wakeLock.request('screen').catch(() => {});
    });
  }
}
init();
</script>
</body>
